<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="PulsarCRM — Единая платформа для управления продажами и клиентами" />
    <meta name="theme-color" content="#4361ee" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="PulsarCRM" />
    <title>PulsarCRM</title>
    <script>
      (function () {
        var key = 'rasl_theme';
        var pref = 'system';
        try {
          var stored = localStorage.getItem(key);
          if (stored === 'light' || stored === 'dark' || stored === 'system') pref = stored;
        } catch (e) {}
        var dark =
          pref === 'dark' ||
          (pref === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        var resolved = dark ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', resolved);
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', dark ? '#161b22' : '#4361ee');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
